version: '3.8'

services:
  recommendation-api:
    build: .
    container_name: recommendation-system
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./trained_models:/app/trained_models
      - ./logs:/app/logs
    environment:
      - DEBUG=False
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
